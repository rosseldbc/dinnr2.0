// ══════════════════════════════════════════
//  CALENDAR EXPORT
// ══════════════════════════════════════════
function monday(ts) {
  const t = ts ? new Date(ts) : new Date(), d = t.getDay(), m = new Date(t);
  m.setDate(t.getDate() - (d===0?6:d-1)); m.setHours(0,0,0,0); return m;
}
function wkey(ts) { const m = monday(ts); return `${m.getFullYear()}-${m.getMonth()+1}-${m.getDate()}`; }
function wlabel(ts) { const m = monday(ts); return `${m.getDate()}/${m.getMonth()+1}/${m.getFullYear()}`; }
function getISOWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}
function updateWeekTabs() {
  const thisMonday = monday();
  const nextMonday = new Date(thisMonday); nextMonday.setDate(thisMonday.getDate() + 7);
  const tabs = document.querySelectorAll('.week-tab');
  if (tabs[0]) tabs[0].textContent = `Week ${getISOWeek(thisMonday)}`;
  if (tabs[1]) tabs[1].textContent = `Week ${getISOWeek(nextMonday)}`;
}
function recentIds() {
  const cut = Date.now() - 14 * 24 * 60 * 60 * 1000;
  return new Set(hist.filter(h => h.ts > cut).map(h => h.id));
}
function toICS(d) { return d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z'; }

function exportICS() {
  const mon = monday(); mon.setHours(18,0,0,0);
  let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Dinnr//NL\r\n';
  Object.keys(plan).forEach(di => {
    const m = plan[di]; if (!m) return;
    const s = new Date(mon); s.setDate(mon.getDate()+parseInt(di)); s.setHours(18,0,0,0);
    const e = new Date(s); e.setHours(19,0,0,0);
    ics += `BEGIN:VEVENT\r\nSUMMARY:${m.e} ${m.name}\r\nDTSTART:${toICS(s)}\r\nDTEND:${toICS(e)}\r\nEND:VEVENT\r\n`;
  });
  ics += 'END:VCALENDAR';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));
  a.download = 'dinnr-week.ics'; a.click();
}

function exportGoogle() {
  const mon = monday(); if (activeWeekOffset === 1) mon.setDate(mon.getDate() + 7); mon.setHours(18,0,0,0);
  const entries = Object.keys(plan).filter(di => plan[di]).map(di => {
    const m = plan[di];
    const s = new Date(mon); s.setDate(mon.getDate()+parseInt(di)); s.setHours(18,0,0,0);
    const e = new Date(s); e.setHours(19,0,0,0);
    const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(m.name)}&dates=${toICS(s)}/${toICS(e)}`;
    return { day: DAYS[di], name: m.name, url };
  });
  if (!entries.length) { showToast('Geen maaltijden gepland!'); return; }
  const root = document.getElementById('overlay-root');
  root.innerHTML = `
    <div class="overlay" style="position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;justify-content:flex-end">
      <div style="flex:1;background:rgba(28,25,23,.5)" onclick="closeOverlay()"></div>
      <div class="sheet" style="background:var(--cream);border-radius:24px 24px 0 0;padding-bottom:calc(env(safe-area-inset-bottom)+20px);max-height:80vh;overflow-y:auto">
        <div class="sheet-handle"></div>
        <div class="sheet-title">Google Calendar</div>
        <div class="sheet-sub">Tik op elke dag om toe te voegen aan je agenda.</div>
        <div style="padding:0 16px 16px;display:flex;flex-direction:column;gap:8px">
          ${entries.map(en => `
            <a href="${en.url}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--cream2);border:1px solid var(--border);border-radius:var(--r2);text-decoration:none;color:inherit;touch-action:manipulation">
              <div style="flex:1;min-width:0">
                <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">${en.day}</div>
                <div style="font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--ink)">${en.name}</div>
              </div>
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--warm2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </a>`).join('')}
        </div>
      </div>
    </div>`;
  attachSheetDismiss(document.querySelector('#overlay-root .sheet'));
}

// ══════════════════════════════════════════
//  UNIFIED INGREDIENT + SHOP SYSTEM
//
//  ingredients[] = central library
//    { id, name, qty, recipe, store, onList, timesUsed, lastUsed, addedTs }
//  "On list" = ingredient.onList === true
//  Checking off → onList=false, timesUsed++, lastUsed=now, bubbles to top
// ══════════════════════════════════════════

// ── badge ──
function updateShopBadge() {
  const n = ingredients.filter(i => i.onList).length;
  const badge = document.getElementById('shop-nav-badge');
  if (badge) badge.classList.toggle('show', n > 0);
}

// ─────────────────────────────
//  SHOP PAGE
// ─────────────────────────────
let shopStoreFilter = 'Alle';

function renderShopPage() {
  updateShopBadge();
  renderShopStoreTabs();
  renderShopList();
}

function renderShopStoreTabs() {
  const onList = ingredients.filter(i => i.onList);
  const stores = ['Alle', ...new Set(onList.map(i => i.store).filter(Boolean))];
  const el = document.getElementById('shop-store-tabs');
  if (!el) return;
  el.innerHTML = stores.map(s =>
    `<button class="store-tab ${shopStoreFilter===s?'active':''}" onclick="setShopStore('${s}')">${s}</button>`
  ).join('');
}

function setShopStore(s) { shopStoreFilter = s; renderShopPage(); }

function renderShopList() {
  const wrap = document.getElementById('shop-list-wrap');
  if (!wrap) return;

  let items = ingredients.filter(i => i.onList);
  if (shopStoreFilter !== 'Alle') items = items.filter(i => i.store === shopStoreFilter);

  // Progress
  const total = ingredients.filter(i => i.onList).length;
  const done = ingredients.filter(i => i.onList && i.checked).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const fill = document.getElementById('shop-prog-fill');
  const txt = document.getElementById('shop-prog-txt');
  if (fill) fill.style.width = pct + '%';
  if (txt) txt.textContent = total ? `${done} / ${total}` : '';

  // "Vaak aangekocht" — top 8 by timesUsed, not currently on list
  const frequent = [...ingredients]
    .filter(i => (i.timesUsed || 0) > 0 && !i.onList)
    .sort((a, b) => (b.timesUsed || 0) - (a.timesUsed || 0))
    .slice(0, 8);

  let html = '';

  if (!items.length) {
    html += `<div class="shop-empty">
      <div class="shop-empty-ico"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></div>
      <div style="font-size:15px;font-weight:500;color:var(--ink);margin-bottom:6px">Lijst is leeg</div>
      <div style="font-size:13px;line-height:1.7">Voeg items toe via de balk onderaan,<br>of gebruik de knoppen rechtsboven.</div>
    </div>`;
  } else {
    // Group unchecked by store
    const unchecked = items.filter(i => !i.checked).sort((a,b) => (a.store||'').localeCompare(b.store||'') || a.name.localeCompare(b.name));
    const checked = items.filter(i => i.checked);
    const groups = {};
    unchecked.forEach(i => { const k = i.store || ''; if (!groups[k]) groups[k]=[]; groups[k].push(i); });
    const multipleGroups = Object.keys(groups).filter(k => k).length > 1;

    Object.keys(groups).sort().forEach(store => {
      if (multipleGroups && store) {
        html += `<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);padding:12px 16px 4px">${store}</div>`;
      }
      html += `<div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin:0 16px 6px">`;
      groups[store].forEach(item => { html += shopItemHtml(item); });
      html += `</div>`;
    });

    if (checked.length) {
      html += `<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);padding:10px 16px 4px">Afgevinkt</div>`;
      html += `<div style="background:var(--cream2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin:0 16px 6px">`;
      checked.forEach(item => { html += shopItemHtml(item); });
      html += `</div>`;
      html += `<div style="text-align:center;padding:4px 0 8px"><button onclick="clearChecked()" style="padding:7px 18px;border-radius:999px;border:1px solid var(--border);background:transparent;font-size:12px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif">Afgevinkte items wissen</button></div>`;
    }
  }

  // ── Vaak aangekocht ──
  if (frequent.length) {
    html += `
    <div style="margin:8px 16px 0;padding:14px;background:var(--cream);border:1px solid var(--border);border-radius:var(--r2)">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--warm)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted)">Vaak aangekocht</div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${frequent.map(item => `
          <button onclick="quickAddFrequent('${item.id}')" style="display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:999px;border:1.5px solid var(--border);background:var(--cream2);font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink2);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent" onmouseover="this.style.borderColor='var(--warm)';this.style.background='var(--warm-lt)'" onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--cream2)'">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            ${item.name}
            <span style="font-size:10px;color:var(--muted);margin-left:1px">${item.timesUsed}×</span>
          </button>`).join('')}
      </div>
    </div>`;
  }

  html += `<div style="height:12px"></div>`;
  wrap.innerHTML = html;
}

function quickAddFrequent(id) {
  const item = ingredients.find(i => i.id === id);
  if (!item) return;
  item.onList = true; item.checked = false;
  saveIngredients();
  renderShopPage();
  showToast(`${item.name} op de lijst`);
}

function shopItemHtml(item) {
  const nameE = item.name.replace(/'/g, "\\'");
  return `<div class="shop-item ${item.checked?'checked':''}" id="shop-item-${item.id}" onclick="toggleShopItem('${item.id}')">
    <div class="shop-check">
      ${item.checked?`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:''}
    </div>
    <div class="shop-item-body">
      <div class="shop-item-name">${item.name}${item.promo?` <span style="font-size:9px;font-weight:700;letter-spacing:.5px;padding:1px 5px;border-radius:999px;background:#EDE9F8;color:#6B4FA0;vertical-align:middle">PROMO</span>`:''}</div>
      <div class="shop-item-meta">
        ${(() => {
          if (item.promo) return item.qty ? `<span class="shop-item-qty">${item.qty}</span>` : '';
          const recs = (item.recipes||[]).filter(r=>r.name);
          if (recs.length === 0) return item.qty ? `<span class="shop-item-qty">${item.qty}</span>` : '';
          if (recs.length === 1) return `${recs[0].qty?`<span class="shop-item-qty">${recs[0].qty}</span>`:''}<span class="shop-item-dish">${recs[0].name}</span>`;
          return recs.map(r=>`<span style="font-size:10px;padding:1px 7px;border-radius:999px;background:var(--cream3);color:var(--ink2);white-space:nowrap">${r.qty?r.qty+' · ':''}${r.name}</span>`).join('');
        })()}
        ${item.category?`<span style="font-size:10px;padding:1px 6px;border-radius:999px;background:var(--warm-lt);color:var(--warm2);font-weight:500">${item.category}</span>`:''}
        ${item.store?`<span class="shop-item-store">${item.store}</span>`:''}
      </div>
    </div>
    <button class="shop-item-del" onclick="event.stopPropagation();startEditShopItem('${item.id}')">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
  </div>`;
}

function startEditShopItem(id) {
  const item = ingredients.find(i => i.id === id);
  const row = document.getElementById('shop-item-' + id);
  if (!item || !row) return;
  row.removeAttribute('onclick');
  row.style.flexWrap = 'wrap';
  row.style.alignItems = 'flex-start';
  row.innerHTML = `
    <div style="flex:1;min-width:0;display:flex;gap:6px;align-items:center;padding:4px 0">
      <input style="flex:1;min-width:0;border:1.5px solid var(--warm);border-radius:var(--r);padding:6px 10px;font-size:13px;background:var(--cream);font-family:'DM Sans',sans-serif" id="edit-si-name-${id}" value="${item.name.replace(/"/g,'&quot;')}">
      <input style="width:72px;border:1.5px solid var(--warm);border-radius:var(--r);padding:6px 8px;font-size:13px;background:var(--cream);font-family:'DM Sans',sans-serif" id="edit-si-qty-${id}" value="${(item.qty||'').replace(/"/g,'&quot;')}" placeholder="Hoev.">
      <button style="width:34px;height:34px;border-radius:var(--r);background:var(--warm);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;touch-action:manipulation" onclick="saveShopItemEdit('${id}')">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>
    <div style="width:100%;overflow-x:auto;padding:6px 0 2px">
      <div id="edit-si-cat-${id}" style="display:flex;gap:4px;min-width:max-content">
        ${INGR_CATEGORIES.map(c=>`<button style="padding:4px 10px;border-radius:999px;border:1.5px solid ${c===item.category?'var(--warm)':'var(--border)'};background:${c===item.category?'var(--warm-lt)':'var(--cream2)'};color:${c===item.category?'var(--warm2)':'var(--muted)'};font-size:11px;cursor:pointer;white-space:nowrap;touch-action:manipulation;transition:all .15s;font-family:'DM Sans',sans-serif" onclick="toggleEditSiCat('${c}','${id}')">${c}</button>`).join('')}
      </div>
    </div>
    <div style="width:100%;overflow-x:auto;padding:2px 0 4px">
      <div id="edit-si-store-${id}" style="display:flex;gap:4px;min-width:max-content">
        ${STORES.slice(1).map(s=>`<button style="padding:4px 10px;border-radius:999px;border:1.5px solid ${s===item.store?'var(--sky)':'var(--border)'};background:${s===item.store?'var(--sky-lt)':'var(--cream2)'};color:${s===item.store?'var(--sky)':'var(--muted)'};font-size:11px;cursor:pointer;white-space:nowrap;touch-action:manipulation;transition:all .15s;font-family:'DM Sans',sans-serif" onclick="toggleEditSiStore('${s}','${id}')">${s}</button>`).join('')}
      </div>
    </div>
    <div style="width:100%;display:flex;justify-content:space-between;align-items:center;padding-top:2px">
      <button onclick="cancelEditShopItem('${id}')" style="background:none;border:none;font-size:11px;color:var(--muted);cursor:pointer;text-decoration:underline;padding:4px;touch-action:manipulation">Annuleren</button>
      <button onclick="removeFromList('${id}')" style="background:none;border:none;font-size:11px;color:var(--muted);cursor:pointer;text-decoration:underline;padding:4px;touch-action:manipulation">Van lijst verwijderen</button>
    </div>`;
}

function cancelEditShopItem(id) {
  renderShopList();
}

function toggleEditSiCat(cat, id) {
  const item = ingredients.find(i => i.id === id);
  if (!item) return;
  item.category = item.category === cat ? '' : cat;
  document.querySelectorAll(`#edit-si-cat-${id} button`).forEach(b => {
    const sel = b.textContent.trim() === item.category;
    b.style.borderColor = sel ? 'var(--warm)' : 'var(--border)';
    b.style.background = sel ? 'var(--warm-lt)' : 'var(--cream2)';
    b.style.color = sel ? 'var(--warm2)' : 'var(--muted)';
  });
}

function toggleEditSiStore(store, id) {
  const item = ingredients.find(i => i.id === id);
  if (!item) return;
  item.store = item.store === store ? '' : store;
  document.querySelectorAll(`#edit-si-store-${id} button`).forEach(b => {
    const sel = b.textContent.trim() === item.store;
    b.style.borderColor = sel ? 'var(--sky)' : 'var(--border)';
    b.style.background = sel ? 'var(--sky-lt)' : 'var(--cream2)';
    b.style.color = sel ? 'var(--sky)' : 'var(--muted)';
  });
}

function saveShopItemEdit(id) {
  const item = ingredients.find(i => i.id === id);
  if (!item) return;
  const nameEl = document.getElementById('edit-si-name-' + id);
  const qtyEl = document.getElementById('edit-si-qty-' + id);
  if (!nameEl) return;
  const newName = nameEl.value.trim();
  if (!newName) { showToast('Vul een naam in'); return; }
  item.name = newName;
  if (qtyEl) item.qty = qtyEl.value.trim();
  saveIngredients();
  renderShopList();
  showToast(`${item.name} opgeslagen`);
}

function toggleShopItem(id) {
  const item = ingredients.find(i => i.id === id);
  if (!item) return;
  if (!item.checked) {
    if (item.promo) {
      // promo: delete immediately, no history
      ingredients = ingredients.filter(i => i.id !== id);
      showToast(`${item.name} ✓ (promo)`);
    } else {
      item.checked = true;
      item.timesUsed = (item.timesUsed || 0) + 1;
      item.lastUsed = Date.now();
      showToast(`${item.name} afgevinkt`);
    }
  } else {
    item.checked = false;
  }
  saveIngredients();
  renderShopList();
}

function removeFromList(id) {
  const item = ingredients.find(i => i.id === id);
  if (!item) return;
  item.onList = false;
  item.checked = false;
  saveIngredients();
  renderShopPage();
  showToast(`${item.name} van lijst verwijderd`);
}

function clearChecked() {
  ingredients.filter(i => i.checked).forEach(i => { i.onList = false; i.checked = false; });
  saveIngredients();
  renderShopPage();
  showToast('Afgevinkte items gewist');
}

function shopQuickAdd() {
  const input = document.getElementById('shop-quick-input');
  const val = input?.value.trim();
  if (!val) return;
  addToListByName(val);
  input.value = '';
  input.focus();
}

function addToListByName(name) {
  const q = name.toLowerCase();
  // Check if exists in ingredients
  let item = ingredients.find(i => i.name.toLowerCase() === q);
  if (item) {
    if (item.onList) { showToast(`${item.name} staat al op de lijst`); return; }
    item.onList = true;
    item.checked = false;
  } else {
    // Create new ingredient and add to list
    item = makeIngredient({ name, onList: true });
    ingredients.unshift(item);
  }
  saveIngredients();
  renderShopPage();
  showToast(`${item.name} toegevoegd`);
}

function openAddShopItem(prefill = '') {
  _si = { name: prefill, qty: '', recipe: '', store: '', category: '', promo: false };
  renderShopItemSheet();
}

let _si = { name: '', qty: '', recipe: '', store: '' };
function filterSiRecipes() {

function setIngrFilter(f) {
  ingrFilter = f;
  document.querySelectorAll('#ingr-f-all,#ingr-f-shop,#ingr-f-free').forEach(el => el.classList.remove('on'));
  const el = document.getElementById('ingr-f-' + f);
  if (el) el.classList.add('on');
  renderIngredients();
}

function renderIngredients() {
  const wrap = document.getElementById('ingr-list-wrap');
  if (!wrap) return;
  const q = (document.getElementById('ingr-search')?.value || '').toLowerCase();

  let items = [...ingredients];
  if (q) items = items.filter(i => i.name.toLowerCase().includes(q));
  if (ingrFilter === 'shop') items = items.filter(i => i.onList);
  if (ingrFilter === 'free') items = items.filter(i => !i.onList);

  // Sort: recently used first, then alphabetical
  items.sort((a,b) => (b.lastUsed||0) - (a.lastUsed||0) || a.name.localeCompare(b.name));

  if (!items.length) {
    wrap.innerHTML = `<div class="shop-empty">
      <div class="shop-empty-ico" style="margin-bottom:12px;opacity:.25"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></div>
      <div style="font-size:14px;font-weight:500;color:var(--ink);margin-bottom:4px">${q ? 'Niets gevonden' : 'Nog geen ingrediënten'}</div>
      <div style="font-size:13px">Voeg ingrediënten toe via het veld onderaan.</div>
    </div>`;
    return;
  }

  wrap.innerHTML = `<div style="display:flex;flex-direction:column;gap:4px;padding:0 16px 8px">
    ${items.map(item => ingrItemHtml(item)).join('')}
  </div>`;
}

function ingrItemHtml(item) {
  const onList = item.onList;
  const ago = item.lastUsed ? timeAgo(item.lastUsed) : null;
  return `<div style="display:flex;align-items:center;gap:10px;padding:11px 12px;background:${onList?'var(--sage-lt)':'var(--cream)'};border:1px solid ${onList?'rgba(59,110,74,.25)':'var(--border)'};border-radius:var(--r2);transition:all .2s">
    <div style="flex:1;min-width:0">
      <div style="font-size:14px;font-weight:500;color:var(--ink);display:flex;align-items:center;gap:6px">
        ${item.name}
        ${item.qty?`<span style="font-size:11px;color:var(--muted);font-weight:400">${item.qty}</span>`:''}
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:3px;align-items:center">
        ${ago?`<span style="font-size:10px;color:var(--muted)">${ago}</span>`:''}
        ${(item.recipes||[]).filter(r=>r.name).map(r=>`<span class="shop-item-dish" style="font-size:10px">${r.name}${r.qty?` · ${r.qty}`:''}</span>`).join('')}
        ${item.store?`<span class="shop-item-store" style="font-size:10px">${item.store}</span>`:''}
        ${item.timesUsed>0?`<span style="font-size:10px;padding:1px 6px;border-radius:999px;background:var(--cream3);color:var(--muted)">${item.timesUsed}×</span>`:''}
      </div>
    </div>
    ${onList
      ? `<button onclick="removeFromList('${item.id}')" style="padding:5px 11px;border-radius:999px;border:1.5px solid rgba(59,110,74,.3);background:var(--sage);color:#fff;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif">Op lijst</button>`
      : `<button onclick="addToList('${item.id}')" style="padding:5px 11px;border-radius:999px;border:1.5px solid var(--border2);background:transparent;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s" onmouseover="this.style.borderColor='var(--sage)';this.style.color='var(--sage)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--muted)'">+ Lijst</button>`
    }
    <button onclick="deleteIngredient('${item.id}')" style="width:26px;height:26px;border-radius:50%;background:transparent;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);flex-shrink:0;opacity:.4;transition:opacity .15s" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.4'">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>`;
}

let _niRecipe = '', _niStore = '';
function filterNiRecipes() {
  const q = (document.getElementById('ni-rec-search')?.value || '').toLowerCase();
  document.querySelectorAll('#ni-recipe-list .dish-opt').forEach(el => {
    el.style.display = el.dataset.r?.toLowerCase().includes(q) ? '' : 'none';
  });
}
function selectNiRecipe(r) {
  _niRecipe = _niRecipe === r ? '' : r;
  document.querySelectorAll('#ni-recipe-list .dish-opt').forEach(el => el.classList.toggle('on', el.dataset.r === _niRecipe));
}
function selectNiStore(s) {
  _niStore = _niStore === s ? '' : s;
  document.querySelectorAll('#ni-stores .store-chip').forEach(el => el.classList.toggle('on', el.textContent.trim() === _niStore));
}
function saveNewIngredient(addToShop) {
  const name = document.getElementById('ni-name')?.value.trim();
  if (!name) { showToast('Vul een naam in'); return; }
  const qty = document.getElementById('ni-qty')?.value.trim();
  const q = name.toLowerCase();
  let item = ingredients.find(i => i.name.toLowerCase() === q);
  if (!item) {
    item = makeIngredient({ name, qty, recipe: _niRecipe, store: _niStore });
    ingredients.unshift(item);
  } else {
    if (qty) item.qty = qty;
    if (_niRecipe) item.recipe = _niRecipe;
    if (_niStore) item.store = _niStore;
  }
  if (addToShop) { item.onList = true; item.checked = false; }
  _niRecipe = ''; _niStore = '';
  saveIngredients();
  closeOverlay();
  renderIngredients();
  updateShopBadge();
  showToast(addToShop ? `${item.name} op de lijst` : `${item.name} opgeslagen`);
}

// Ingredient inline add from recipe detail
function addIngrToRecipe(recipeId) {
  const r = recipes.find(x => x.id === recipeId);
  if (!r) return;
  const nameEl = document.getElementById(`ingr-name-${recipeId}`);
  const qtyEl = document.getElementById(`ingr-qty-${recipeId}`);
  const name = nameEl?.value.trim();
  if (!name) return;
  const qty = qtyEl?.value.trim() || '';
  const q = name.toLowerCase();
  let item = ingredients.find(i => i.name.toLowerCase() === q);
  if (!item) {
    item = makeIngredient({ name, recipes: [{ name: r.name, qty }], category: _ingrAddCat, store: _ingrAddStore });
    ingredients.unshift(item);
  } else {
    if (!item.recipes) item.recipes = [];
    const link = item.recipes.find(rr => rr.name === r.name);
    if (link) { if (qty) link.qty = qty; }
    else item.recipes.push({ name: r.name, qty });
    if (_ingrAddCat) item.category = _ingrAddCat;
    if (_ingrAddStore) item.store = _ingrAddStore;
  }
  saveIngredients();
  nameEl.value = '';
  if (qtyEl) qtyEl.value = '';
  nameEl.focus();
  renderRecipeDetailSheet(recipeId);
}

function removeIngrFromRecipe(itemId, recipeId) {
  const r = recipes.find(x => x.id === recipeId);
  const item = ingredients.find(i => i.id === itemId);
  if (!item) return;
  if (!confirm(`"${item.name}" verwijderen uit dit recept?`)) return;
  if (r && item.recipes) {
    item.recipes = item.recipes.filter(rr => rr.name !== r.name);
    // Only delete the ingredient entirely if it has no other recipe links and isn't on the list
    if (!item.recipes.length && !item.onList) {
      ingredients = ingredients.filter(i => i.id !== itemId);
    }
  } else {
    ingredients = ingredients.filter(i => i.id !== itemId);
  }
  saveIngredients();
  renderRecipeDetailSheet(recipeId);
}

function startEditIngr(itemId, recipeId) {

    <input style="width:70px;border:1.5px solid var(--warm);border-radius:var(--r);padding:6px 8px;font-size:13px;background:var(--cream);font-family:'DM Sans',sans-serif" id="edit-ingr-qty-${itemId}" value="${currentQty.replace(/"/g,'&quot;')}" placeholder="Hoev.">

    </div>`;
}

function toggleEditCat(cat, itemId) {
  const item = ingredients.find(i => i.id === itemId);
  if (!item) return;
  item.category = item.category === cat ? '' : cat;
  document.querySelectorAll(`#edit-cat-chips-${itemId} button`).forEach(b => {
    const sel = b.textContent.trim() === item.category;
    b.style.borderColor = sel ? 'var(--warm)' : 'var(--border)';
    b.style.background = sel ? 'var(--warm-lt)' : 'var(--cream2)';
    b.style.color = sel ? 'var(--warm2)' : 'var(--muted)';
  });
}
function toggleEditStore(store, itemId) {
  const item = ingredients.find(i => i.id === itemId);
  if (!item) return;
  item.store = item.store === store ? '' : store;
  document.querySelectorAll(`#edit-store-chips-${itemId} button`).forEach(b => {
    const sel = b.textContent.trim() === item.store;
    b.style.borderColor = sel ? 'var(--sky)' : 'var(--border)';
    b.style.background = sel ? 'var(--sky-lt)' : 'var(--cream2)';
    b.style.color = sel ? 'var(--sky)' : 'var(--muted)';
  });
}

function saveIngrEdit(itemId, recipeId) {
  const item = ingredients.find(i => i.id === itemId);
  const r = recipes.find(x => x.id === recipeId);
  if (!item || !r) return;
  const nameEl = document.getElementById('edit-ingr-name-' + itemId);
  const qtyEl = document.getElementById('edit-ingr-qty-' + itemId);
  if (!nameEl) return;
  const newName = nameEl.value.trim();
  const newQty = qtyEl ? qtyEl.value.trim() : '';
  if (!newName) { showToast('Vul een naam in!'); return; }
  item.name = newName;
  const rLink = item.recipes?.find(rr => rr.name === r.name);
  if (rLink) rLink.qty = newQty;
  else if (item.recipes) item.recipes.push({ name: r.name, qty: newQty });
  // keep top-level qty in sync for backwards compat
  if (item.recipes?.length === 1) item.qty = newQty;
  saveIngredients();
  renderRecipeDetailSheet(recipeId);
}

function addAllIngrToShop(recipeId) {
  const r = recipes.find(x => x.id === recipeId);
  if (!r) return;
  const linked = ingredients.filter(i => i.recipes?.some(rr => rr.name === r.name));
  let added = 0;
  linked.forEach(i => { if (!i.onList) { i.onList = true; i.checked = false; added++; } });
  saveIngredients();
  closeOverlay();
  showPage('shop');
  showToast(added > 0 ? `${added} ingrediënt${added!==1?'en':''} op de lijst` : 'Alles stond al op de lijst');
}

// Legacy compat stubs (called from old HTML)
function importFromMenu() { shopAddFromMenu(); }
function addIngredientForMeal(id, name) { closeOverlay(); openAddShopItemForRecipe(name); }
function openAddShopItemForDish(name) { openAddShopItemForRecipe(name); }

// Helper
let _ingrAddCat = '', _ingrAddStore = '';

function setIngrAddCat(cat, id) {
  _ingrAddCat = _ingrAddCat === cat ? '' : cat;
  document.querySelectorAll(`#ingr-cat-chips-${id} button`).forEach(b =>
    b.classList.toggle('on', b.textContent.trim() === _ingrAddCat));
}
function setIngrAddStore(store, id) {
  _ingrAddStore = _ingrAddStore === store ? '' : store;
  document.querySelectorAll(`#ingr-store-chips-${id} button`).forEach(b =>
    b.classList.toggle('on', b.textContent.trim() === _ingrAddStore));
}
function prefillIngrChips(recipeId) {
  const nameEl = document.getElementById('ingr-name-' + recipeId);
  if (!nameEl) return;
  const q = nameEl.value.trim().toLowerCase();
  const existing = ingredients.find(i => i.name.toLowerCase() === q);
  if (existing) {
    if (existing.category && existing.category !== _ingrAddCat) setIngrAddCat(existing.category, recipeId);
    if (existing.store && existing.store !== _ingrAddStore) setIngrAddStore(existing.store, recipeId);
  }
}

function makeIngredient(props) {
  // recipes: [{ name, qty }] — per-recipe links with individual quantities
  const recipes = props.recipes || (props.recipe ? [{ name: props.recipe, qty: props.qty || '' }] : []);
  return {
    id: 'i_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    name: props.name || '',
    qty: props.qty || '',
    recipes,
    category: props.category || '',
    store: props.store || '',
    promo: props.promo || false,
    onList: props.onList || false,
    checked: false,
    timesUsed: 0,
    lastUsed: null,
    addedTs: Date.now()
  };
}

function timeAgo(ts) {
  const d = Math.floor((Date.now() - ts) / 86400000);
  if (d === 0) return 'Vandaag';
  if (d === 1) return 'Gisteren';
  if (d < 7) return `${d}d geleden`;
  if (d < 30) return `${Math.floor(d/7)}w geleden`;
  return `${Math.floor(d/30)}m geleden`;
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
loadAll().then(() => {
  showPage('menu');
  updateShopBadge();
});
